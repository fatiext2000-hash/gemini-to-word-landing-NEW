<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Enjoying Gemini to Word? — Quick Favor</title>
  <meta name="robots" content="noindex, nofollow" />

  <link rel="icon" type="image/png" href="/assets/icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="rate.css" />
</head>
<body>

  <main class="rate-wrapper">
    <!-- Ambient glow backgrounds -->
    <div class="glow glow-1"></div>
    <div class="glow glow-2"></div>

    <div class="rate-card">
      <div class="card-header">
        <img src="assets/icon.png" alt="Gemini to Word" class="card-icon" />
        <div class="eyebrow">QUICK FAVOR</div>
      </div>

      <h1>Enjoying Gemini to Word?</h1>

      <p class="rate-description">
        If Gemini to Word helps you save time, please leave a quick rating
        in the Chrome Web Store. It helps a lot and takes just 10 seconds.
      </p>

      <div class="exports-pill" id="exportsPill" hidden>
        <span class="sparkle">✨</span>
        You've exported <strong id="exportCount">2</strong> chats already
      </div>

      <div class="rate-actions">
        <button id="rateBtn" class="btn-rate">
          <span class="star">★</span>
          Rate Gemini to Word
        </button>
        <button id="dismissBtn" class="btn-dismiss">Dismiss</button>
      </div>

      <p class="rate-footnote">This prompt is shown only once.</p>
    </div>
  </main>

  <script src="rate.js"></script>
</body>
</html>
